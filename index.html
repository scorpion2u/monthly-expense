<script>
  (function(){
    const STORAGE_KEY='ledger_fusion_v17', RATE_KEY='ledger_exchange_rate';
    let currentRate=3.0975, data={banks:[], transactions:[]}, nextBankId=1, nextTransactionId=1, expandedBanks={}, editingTransactionId=null, editingBankId=null, currentBankId=null;

    const transactionFormOverlay=document.getElementById('transactionFormOverlay'), transactionFormTitle=document.getElementById('transactionFormTitle'), transactionNameInput=document.getElementById('transactionNameInput'), transactionAmountInput=document.getElementById('transactionAmountInput'), transactionCurrency=document.getElementById('transactionCurrency'), transactionType=document.getElementById('transactionType'), transactionStatusEl=document.getElementById('transactionStatus'), transactionSaveBtn=document.getElementById('transactionSaveBtn'), transactionCancelBtn=document.getElementById('transactionCancelBtn');
    const modalOverlay=document.getElementById('modalOverlay'), modalMessage=document.getElementById('modalMessage'), modalConfirm=document.getElementById('modalConfirm'), modalCancel=document.getElementById('modalCancel'), clearConfirmOverlay=document.getElementById('clearConfirmOverlay'), clearConfirmInput=document.getElementById('clearConfirmInput'), clearConfirmCancel=document.getElementById('clearConfirmCancel'), clearConfirmOk=document.getElementById('clearConfirmOk'), menuOverlay=document.getElementById('menuOverlay'), menuBtn=document.getElementById('menuBtn'), menuCloseBtn=document.getElementById('menuCloseBtn'), importFile=document.getElementById('importFile'), exportNotesBtn=document.getElementById('exportNotesBtn'), exportNotesOverlay=document.getElementById('exportNotesOverlay'), notesPreview=document.getElementById('notesPreview'), copyNotesBtn=document.getElementById('copyNotesBtn'), downloadNotesBtn=document.getElementById('downloadNotesBtn'), closeNotesBtn=document.getElementById('closeNotesBtn'), installBtn=document.getElementById('installAppBtn'), rateEditIcon=document.getElementById('rateEditIcon');
    let toastTimer, modalResolve=null;
    
    // 智能排序：将记录移动到同分类的底部或顶部
    function moveTransactionToBottom(tid, bankId) {
        const bankTransactions = data.transactions.filter(tr => tr.bankId === bankId);
        const currentIndex = bankTransactions.findIndex(tr => tr.id === tid);
        if (currentIndex === -1) return false;
        
        // 找到该记录在全局数组中的位置
        const globalIndex = data.transactions.findIndex(tr => tr.id === tid);
        if (globalIndex === -1) return false;
        
        // 找到该分类最后一条记录在全局数组中的位置
        const lastTransaction = bankTransactions[bankTransactions.length - 1];
        const lastGlobalIndex = data.transactions.findIndex(tr => tr.id === lastTransaction.id);
        
        if (globalIndex !== lastGlobalIndex) {
            const [moved] = data.transactions.splice(globalIndex, 1);
            // 如果移动的元素原来在最后一条之后，需要调整插入位置
            let insertPos = lastGlobalIndex;
            if (globalIndex < lastGlobalIndex) insertPos = lastGlobalIndex;
            else insertPos = lastGlobalIndex;
            data.transactions.splice(insertPos + 1, 0, moved);
        }
        return true;
    }
    
    function moveTransactionToTop(tid, bankId) {
        const bankTransactions = data.transactions.filter(tr => tr.bankId === bankId);
        const currentIndex = bankTransactions.findIndex(tr => tr.id === tid);
        if (currentIndex === -1) return false;
        
        const globalIndex = data.transactions.findIndex(tr => tr.id === tid);
        if (globalIndex === -1) return false;
        
        const firstTransaction = bankTransactions[0];
        const firstGlobalIndex = data.transactions.findIndex(tr => tr.id === firstTransaction.id);
        
        if (globalIndex !== firstGlobalIndex) {
            const [moved] = data.transactions.splice(globalIndex, 1);
            let insertPos = firstGlobalIndex;
            if (globalIndex < firstGlobalIndex) insertPos = firstGlobalIndex - 1;
            data.transactions.splice(insertPos, 0, moved);
        }
        return true;
    }
    
    // ======================= 拖拽系统 =======================
    let dragState = {
        isDragging: false,
        dragType: null,
        dragElement: null,
        dragId: null,
        dragBankId: null,
        startX: 0, startY: 0,
        hasMoved: false,
        targetElement: null,
        targetId: null,
        targetBankId: null
    };
    
    function initDragAndDrop() {
        document.querySelectorAll('.bank-handle').forEach(handle => {
            handle.removeEventListener('touchstart', onDragStart);
            handle.removeEventListener('mousedown', onDragStart);
            handle.addEventListener('touchstart', onDragStart, { passive: false });
            handle.addEventListener('mousedown', onDragStart);
        });
        document.querySelectorAll('.bill-handle').forEach(handle => {
            handle.removeEventListener('touchstart', onDragStart);
            handle.removeEventListener('mousedown', onDragStart);
            handle.addEventListener('touchstart', onDragStart, { passive: false });
            handle.addEventListener('mousedown', onDragStart);
        });
    }
    
    function onDragStart(e) {
        e.preventDefault();
        const handle = e.target.closest('[class*="handle"]');
        if (!handle) return;
        
        if (handle.classList.contains('bank-handle')) {
            dragState.dragType = 'bank';
            dragState.dragId = handle.closest('.bank-group').dataset.bankId;
            dragState.dragElement = handle.closest('.bank-group');
        } else if (handle.classList.contains('bill-handle')) {
            dragState.dragType = 'transaction';
            dragState.dragId = handle.closest('.transaction-item').dataset.transactionId;
            dragState.dragBankId = handle.closest('.bank-group').dataset.bankId;
            dragState.dragElement = handle.closest('.transaction-item');
        }
        
        if (!dragState.dragElement) return;
        
        dragState.startX = e.touches ? e.touches[0].clientX : e.clientX;
        dragState.startY = e.touches ? e.touches[0].clientY : e.clientY;
        dragState.hasMoved = false;
        dragState.isDragging = true;
        dragState.dragElement.classList.add('dragging');
        dragState.dragElement.style.position = 'relative';
        dragState.dragElement.style.zIndex = '100';
        
        if (e.type === 'touchstart') {
            document.addEventListener('touchmove', onDragMove);
            document.addEventListener('touchend', onDragEnd);
        } else {
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', onDragEnd);
        }
    }
    
    function onDragMove(e) {
        if (!dragState.isDragging) return;
        e.preventDefault();
        
        const currentX = e.touches ? e.touches[0].clientX : e.clientX;
        const currentY = e.touches ? e.touches[0].clientY : e.clientY;
        const deltaX = Math.abs(currentX - dragState.startX);
        const deltaY = Math.abs(currentY - dragState.startY);
        
        if (!dragState.hasMoved && (deltaX > 5 || deltaY > 5)) {
            dragState.hasMoved = true;
        }
        
        if (!dragState.hasMoved) return;
        
        if (dragState.dragElement) {
            dragState.dragElement.style.transform = `translateY(${currentY - dragState.startY}px)`;
            dragState.dragElement.style.transition = 'none';
        }
        
        const elemUnderCursor = document.elementsFromPoint(currentX, currentY);
        let target = null;
        
        for (let el of elemUnderCursor) {
            if (dragState.dragType === 'bank' && el.classList && el.classList.contains('bank-group') && el !== dragState.dragElement) {
                target = el;
                break;
            }
            if (dragState.dragType === 'transaction' && el.classList && el.classList.contains('transaction-item') && el !== dragState.dragElement) {
                if (el.closest('.bank-group').dataset.bankId === dragState.dragBankId) {
                    target = el;
                    break;
                }
            }
        }
        
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        if (target) {
            target.classList.add('drag-over');
            dragState.targetElement = target;
            if (dragState.dragType === 'bank') {
                dragState.targetId = target.dataset.bankId;
            } else {
                dragState.targetId = target.dataset.transactionId;
                dragState.targetBankId = target.closest('.bank-group').dataset.bankId;
            }
        } else {
            dragState.targetElement = null;
            dragState.targetId = null;
            dragState.targetBankId = null;
        }
    }
    
    function onDragEnd(e) {
        if (!dragState.isDragging) return;
        
        if (dragState.dragElement) {
            dragState.dragElement.style.transform = '';
            dragState.dragElement.style.transition = '';
            dragState.dragElement.style.position = '';
            dragState.dragElement.style.zIndex = '';
            dragState.dragElement.classList.remove('dragging');
        }
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        
        if (dragState.hasMoved && dragState.targetElement && dragState.targetId) {
            if (dragState.dragType === 'bank') {
                const banks = [...data.banks];
                const fromIdx = banks.findIndex(b => b.id == dragState.dragId);
                const toIdx = banks.findIndex(b => b.id == dragState.targetId);
                if (fromIdx !== -1 && toIdx !== -1 && fromIdx !== toIdx) {
                    const [moved] = banks.splice(fromIdx, 1);
                    banks.splice(toIdx, 0, moved);
                    data.banks = banks;
                    saveData();
                    render();
                    showToast('分类顺序已更新');
                }
            } else if (dragState.dragType === 'transaction') {
                if (dragState.dragBankId === dragState.targetBankId) {
                    const bankId = parseInt(dragState.dragBankId);
                    const bank = data.banks.find(b => b.id === bankId);
                    if (bank) {
                        const transactions = data.transactions.filter(t => t.bankId === bankId);
                        const fromIdx = transactions.findIndex(t => t.id == dragState.dragId);
                        const toIdx = transactions.findIndex(t => t.id == dragState.targetId);
                        if (fromIdx !== -1 && toIdx !== -1 && fromIdx !== toIdx) {
                            const allTransactions = [...data.transactions];
                            const fromGlobalIdx = allTransactions.findIndex(t => t.id == dragState.dragId);
                            const toGlobalIdx = allTransactions.findIndex(t => t.id == dragState.targetId);
                            if (fromGlobalIdx !== -1 && toGlobalIdx !== -1) {
                                const [moved] = allTransactions.splice(fromGlobalIdx, 1);
                                allTransactions.splice(toGlobalIdx, 0, moved);
                                data.transactions = allTransactions;
                                saveData();
                                render();
                                showToast('记录顺序已更新');
                            }
                        }
                    }
                }
            }
        }
        
        dragState = {
            isDragging: false,
            dragType: null,
            dragElement: null,
            dragId: null,
            dragBankId: null,
            startX: 0, startY: 0,
            hasMoved: false,
            targetElement: null,
            targetId: null,
            targetBankId: null
        };
        
        document.removeEventListener('touchmove', onDragMove);
        document.removeEventListener('touchend', onDragEnd);
        document.removeEventListener('mousemove', onDragMove);
        document.removeEventListener('mouseup', onDragEnd);
    }
    
    function showToast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1800); }
    function showModal(message,options={}){ return new Promise(resolve=>{ modalResolve=resolve; modalMessage.textContent=message; document.getElementById('modalIcon').textContent=options.icon||'⚠️'; modalConfirm.className='btn confirm-btn'+(options.confirmClass?' '+options.confirmClass:' confirm-danger'); modalConfirm.textContent=options.confirmText||'确认'; modalCancel.textContent=options.cancelText||'取消'; modalCancel.style.display=options.showCancel===false?'none':''; modalOverlay.classList.add('show'); }); }
    function hideModal(result){ modalOverlay.classList.remove('show'); if(modalResolve){ modalResolve(result); modalResolve=null; } }
    modalConfirm.onclick=()=>hideModal(true); modalCancel.onclick=()=>hideModal(false); modalOverlay.addEventListener('click',e=>{ if(e.target===modalOverlay) hideModal(false); });
    function escapeHtml(str){ if(!str)return ''; const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
    function normalizeData(d){ if(!d.banks)d.banks=[]; if(!d.transactions)d.transactions=[]; d.transactions.forEach(t=>{ if(!t.type)t.type='expense'; if(!t.status)t.status='unpaid'; if(!t.originalCurrency){ t.originalCurrency='MYR'; t.originalAmount=t.amountMYR; } if(t.originalAmount===undefined)t.originalAmount=t.amountMYR; }); return d; }
    function loadData(){ const savedRate=localStorage.getItem(RATE_KEY); if(savedRate&&!isNaN(parseFloat(savedRate))){ currentRate=parseFloat(savedRate); rateInput.value=currentRate; }else rateInput.value=currentRate; const saved=localStorage.getItem(STORAGE_KEY); if(saved){ try{ data=JSON.parse(saved); data=normalizeData(data); }catch(e){ data={banks:[],transactions:[]}; } }else data={banks:[],transactions:[]}; nextBankId=Math.max(1,...data.banks.map(b=>b.id),1); nextTransactionId=Math.max(1,...data.transactions.map(t=>t.id),1); const savedExpanded=localStorage.getItem('expandedBanks_fusion'); expandedBanks=savedExpanded?JSON.parse(savedExpanded):{}; }
    function saveData(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); }
    function saveRate(){ localStorage.setItem(RATE_KEY,currentRate); }
    function saveExpandedState(){ localStorage.setItem('expandedBanks_fusion',JSON.stringify(expandedBanks)); }
    function getBankTransactions(bankId){ return data.transactions.filter(t=>t.bankId===bankId); }
    function getTotals(){ let totalInc=0,totalExp=0,pendingInc=0,pendingExp=0,paidIncC=0,unpaidIncC=0,paidExpC=0,unpaidExpC=0; data.transactions.forEach(t=>{ const amt=parseFloat(t.amountMYR)||0; if(t.type==='income'){ totalInc+=amt; if(t.status==='unpaid'){ pendingInc+=amt; unpaidIncC++; }else paidIncC++; }else{ totalExp+=amt; if(t.status==='unpaid'){ pendingExp+=amt; unpaidExpC++; }else paidExpC++; } }); const net=(totalInc-pendingInc)-(totalExp-pendingExp); return {totalInc,totalExp,pendingInc,pendingExp,incC:unpaidIncC+paidIncC,expC:unpaidExpC+paidExpC,pendingIncC:unpaidIncC,pendingExpC:unpaidExpC,net}; }
    function updateSummary(){ const t=getTotals(); totalIncomeEl.textContent='RM '+t.totalInc.toFixed(2); totalIncomeCountEl.textContent=t.incC+' 笔'; totalExpenseEl.textContent='RM '+t.totalExp.toFixed(2); totalExpenseCountEl.textContent=t.expC+' 笔'; pendingIncomeEl.textContent='RM '+t.pendingInc.toFixed(2); pendingIncomeCountEl.textContent=t.pendingIncC+' 笔'; pendingExpenseEl.textContent='RM '+t.pendingExp.toFixed(2); pendingExpenseCountEl.textContent=t.pendingExpC+' 笔'; netBalanceEl.textContent='RM '+t.net.toFixed(2); netBalanceEl.style.color=t.net>=0?'#2f6b44':'#c25a3a'; }
    function generateNotes(){ let notes='📒 帐目记录 · 记账笔记\n📅 生成时间：'+new Date().toLocaleDateString('zh-CN')+'\n💱 汇率：1 SGD = '+currentRate+' MYR\n────────────────────────\n\n'; if(data.banks.length===0) notes+='暂无分类和记录。\n'; else data.banks.forEach(bank=>{ const transactions=getBankTransactions(bank.id); if(transactions.length===0) return; notes+=`【${bank.name}】\n`; [...transactions].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(t=>{ const prefix=t.type==='income'?'➕ 收入':'➖ 支付'; const currencyInfo=t.originalCurrency==='SGD'?` (SGD ${t.originalAmount.toFixed(2)})`:''; notes+=`  ${t.date} ${prefix}：${t.name}  RM ${parseFloat(t.amountMYR).toFixed(2)}${currencyInfo}\n`; }); notes+='\n'; }); notes+='────────────────────────\n📱 帐目记录 · 记账工具'; return notes; }
    function render(){
      listEl.innerHTML='';
      if(!data.banks.length){ listEl.innerHTML='<div class="empty-state"><div class="empty-state-icon">📂</div><div class="empty-state-text">暂无分类</div><div class="empty-state-hint">点击右上角➕添加分类</div></div>'; updateSummary(); return; }
      data.banks.forEach(bank=>{
        const bankTransactions=getBankTransactions(bank.id);
        let paidInc=0,unpaidInc=0,paidExp=0,unpaidExp=0,paidIncC=0,unpaidIncC=0,paidExpC=0,unpaidExpC=0;
        bankTransactions.forEach(t=>{ const amt=parseFloat(t.amountMYR)||0; if(t.type==='income'){ if(t.status==='paid'){ paidInc+=amt; paidIncC++; }else{ unpaidInc+=amt; unpaidIncC++; } }else{ if(t.status==='paid'){ paidExp+=amt; paidExpC++; }else{ unpaidExp+=amt; unpaidExpC++; } } });
        let statusHtml='<div class="bank-status-stats">';
        if(paidIncC>0) statusHtml+=`<span class="stat-item stat-paid-income">✅已收入 ${paidIncC} 笔 RM${paidInc.toFixed(2)}</span>`;
        if(unpaidIncC>0) statusHtml+=`<span class="stat-item stat-unpaid-income">⏳待收入 ${unpaidIncC} 笔 RM${unpaidInc.toFixed(2)}</span>`;
        if(paidExpC>0) statusHtml+=`<span class="stat-item stat-paid-expense">💰已支付 ${paidExpC} 笔 RM${paidExp.toFixed(2)}</span>`;
        if(unpaidExpC>0) statusHtml+=`<span class="stat-item stat-unpaid-expense">⚠️待支付 ${unpaidExpC} 笔 RM${unpaidExp.toFixed(2)}</span>`;
        if(paidIncC===0 && unpaidIncC===0 && paidExpC===0 && unpaidExpC===0) statusHtml+='<span style="font-size:0.65rem;opacity:0.4;">暂无记录</span>';
        statusHtml+='</div>';
        const isExpanded=expandedBanks[bank.id]!==false;
        const groupDiv=document.createElement('div'); groupDiv.className='bank-group'+(isExpanded?' expanded':''); groupDiv.dataset.bankId=bank.id;
        let transactionsHtml=''; 
        bankTransactions.forEach(t=>{ const isIncome=t.type==='income', isPaid=t.status==='paid'; const currencyDisplay=t.originalCurrency==='SGD'?`SGD ${t.originalAmount.toFixed(2)} → `:''; const statusLabel=isIncome?(isPaid?'已收入':'待收入'):(isPaid?'已支付':'待支付'); const statusClass=isIncome?(isPaid?'paid-income':'unpaid-income'):(isPaid?'paid-expense':'unpaid-expense'); transactionsHtml+=`<div class="transaction-item ${isIncome?'income-item':'expense-item'}" data-transaction-id="${t.id}"><span class="bill-handle">⋮⋮</span><div class="transaction-info"><div class="transaction-name">${escapeHtml(t.name)}</div><div><span class="status-badge ${statusClass}">${statusLabel}</span></div><div class="transaction-meta">${currencyDisplay}MYR ${parseFloat(t.amountMYR).toFixed(2)}</div></div><span class="transaction-amount ${isIncome?'income-amount':'expense-amount'}">${isIncome?'+':'-'}RM ${parseFloat(t.amountMYR).toFixed(2)}</span><div class="transaction-actions"><button class="icon-btn toggle-status" data-transaction-id="${t.id}"><div class="icon-dot ${isPaid?'paid':'unpaid'}"></div></button><button class="icon-btn edit-transaction" data-transaction-id="${t.id}"><div class="icon-edit"></div></button><button class="icon-btn del-transaction" data-transaction-id="${t.id}"><div class="icon-del"></div></button></div></div>`; });
        if(bankTransactions.length===0) transactionsHtml+='<div class="empty-hint">暂无记录</div>';
        transactionsHtml+=`<div class="bank-items-footer"><div class="add-transaction-btn" data-bank-id="${bank.id}">＋ 添加记录</div><button class="btn-delete-bank" data-bank-id="${bank.id}" data-bank-name="${escapeHtml(bank.name)}">🗑 删除分类</button></div>`;
        groupDiv.innerHTML=`<div class="bank-header"><div class="bank-header-main"><span class="bank-handle">⋮⋮</span><span class="bank-icon">📁</span><div class="bank-header-info"><div><span class="bank-name">${escapeHtml(bank.name)}</span></div>${statusHtml}</div></div><div class="bank-header-actions"><span class="edit-bank-icon" data-bank-id="${bank.id}" data-bank-name="${escapeHtml(bank.name)}">✏️</span><span class="collapse-icon">▼</span></div></div><div class="bank-body"><div class="bank-items">${transactionsHtml}</div></div>`;
        const headerEl=groupDiv.querySelector('.bank-header'); headerEl.onclick=e=>{ if(e.target.closest('.bank-handle')||e.target.closest('.edit-bank-icon')) return; expandedBanks[bank.id]=!expandedBanks[bank.id]; saveExpandedState(); render(); };
        listEl.appendChild(groupDiv);
      });
      
      // 状态切换按钮 - 带智能排序
      document.querySelectorAll('.toggle-status').forEach(btn=>{ 
        btn.onclick=e=>{ 
          e.stopPropagation(); 
          const tid=parseInt(btn.dataset.transactionId); 
          const t=data.transactions.find(x=>x.id===tid); 
          if(t){ 
            const oldStatus = t.status;
            const newStatus = oldStatus === 'paid' ? 'unpaid' : 'paid';
            t.status = newStatus;
            
            // 智能排序：已支付/已收入移到底部，未支付/未收入移到顶部
            if (newStatus === 'paid') {
              moveTransactionToBottom(tid, t.bankId);
              showToast('已支付，已移至底部');
            } else {
              moveTransactionToTop(tid, t.bankId);
              showToast('未支付，已移至顶部');
            }
            
            saveData(); 
            render(); 
          } 
        }; 
      });
      
      document.querySelectorAll('.edit-transaction').forEach(btn=>{ btn.onclick=e=>{ e.stopPropagation(); const tid=parseInt(btn.dataset.transactionId); const t=data.transactions.find(x=>x.id===tid); if(t){ editingTransactionId=tid; transactionNameInput.value=t.name; transactionAmountInput.value=t.originalAmount; transactionCurrency.value=t.originalCurrency||'MYR'; transactionType.value=t.type||'expense'; transactionStatusEl.value=t.status||'unpaid'; openTransactionForm(t.bankId); } }; });
      document.querySelectorAll('.del-transaction').forEach(btn=>{ btn.onclick=e=>{ e.stopPropagation(); const tid=parseInt(btn.dataset.transactionId); const t=data.transactions.find(x=>x.id===tid); if(t){ showModal('确定删除「'+t.name+'」吗？',{icon:'🗑️',confirmText:'删除',confirmClass:'confirm-danger'}).then(ok=>{ if(ok){ data.transactions=data.transactions.filter(x=>x.id!==tid); saveData(); showToast('已删除'); render(); } }); } }; });
      document.querySelectorAll('.add-transaction-btn').forEach(btn=>{ btn.onclick=e=>{ e.stopPropagation(); const bankId=parseInt(btn.dataset.bankId); editingTransactionId=null; transactionNameInput.value=''; transactionAmountInput.value=''; transactionCurrency.value='MYR'; transactionType.value='expense'; transactionStatusEl.value='unpaid'; openTransactionForm(bankId); }; });
      document.querySelectorAll('.btn-delete-bank').forEach(btn=>{ btn.onclick=e=>{ e.stopPropagation(); const bankId=parseInt(btn.dataset.bankId); const bankName=btn.dataset.bankName; const count=getBankTransactions(bankId).length; showModal('确定删除「'+bankName+'」及其所有 '+count+' 条记录吗？',{icon:'🗑️',confirmText:'确认删除',confirmClass:'confirm-danger'}).then(ok=>{ if(ok){ data.banks=data.banks.filter(b=>b.id!==bankId); data.transactions=data.transactions.filter(t=>t.bankId!==bankId); delete expandedBanks[bankId]; saveExpandedState(); saveData(); showToast('「'+bankName+'」已删除'); render(); } }); }; });
      document.querySelectorAll('.edit-bank-icon').forEach(btn=>{ btn.onclick=e=>{ e.stopPropagation(); const bankId=parseInt(btn.dataset.bankId); const bankName=btn.dataset.bankName; editingBankId=bankId; bankFormTitle.textContent='编辑分类'; bankNameInput.value=bankName; bankFormOverlay.classList.add('show'); setTimeout(()=>bankNameInput.focus(),150); }; });
      updateSummary();
      initDragAndDrop();
    }
    function openBankForm(){ bankFormTitle.textContent='添加分类'; editingBankId=null; bankNameInput.value=''; bankFormOverlay.classList.add('show'); setTimeout(()=>bankNameInput.focus(),150); }
    function closeBankForm(){ bankFormOverlay.classList.remove('show'); editingBankId=null; }
    function openTransactionForm(bankId){ currentBankId=bankId; transactionFormTitle.textContent=editingTransactionId?'编辑记录':'新增记录'; transactionFormOverlay.classList.add('show'); setTimeout(()=>transactionNameInput.focus(),150); }
    function closeTransactionForm(){ transactionFormOverlay.classList.remove('show'); editingTransactionId=null; currentBankId=null; }
    function applyExchangeRate(){ const val=parseFloat(rateInput.value); if(isNaN(val)||val<=0){ showToast('请输入有效汇率'); rateInput.value=currentRate; return; } if(Math.abs(val-currentRate)<0.0001) return; currentRate=val; saveRate(); let recalcCount=0; data.transactions.forEach(t=>{ if(t.originalCurrency==='SGD'){ const newAmt=t.originalAmount*currentRate; if(Math.abs(t.amountMYR-newAmt)>0.001){ t.amountMYR=newAmt; recalcCount++; } } }); if(recalcCount>0){ saveData(); render(); showToast(`汇率已更新，已重新换算 ${recalcCount} 条 SGD 记录`); } else showToast('汇率已保存'); }
    function setAllStatusToPaid(){ if(data.transactions.length===0){ showToast('没有记录可切换'); return; } showModal('确定将所有记录改为「已收入」和「已支付」状态吗？',{icon:'🟢',confirmText:'确认',confirmClass:'confirm-safe'}).then(ok=>{ if(ok){ data.transactions.forEach(t=>{ t.status='paid'; }); saveData(); showToast('已全部设为已收入/已支付'); render(); } }); }
    function setAllStatusToUnpaid(){ if(data.transactions.length===0){ showToast('没有记录可切换'); return; } showModal('确定将所有记录改为「未收入」和「未支出」状态吗？',{icon:'🔴',confirmText:'确认',confirmClass:'confirm-safe'}).then(ok=>{ if(ok){ data.transactions.forEach(t=>{ t.status='unpaid'; }); saveData(); showToast('已全部设为未收入/未支出'); render(); } }); }
    function initEventListeners(){ rateEditIcon.onclick=()=>{ rateInput.focus(); rateInput.select(); }; rateInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); applyExchangeRate(); rateInput.blur(); } }); rateInput.addEventListener('blur',applyExchangeRate); rateInput.addEventListener('change',applyExchangeRate); menuBtn.onclick=()=>menuOverlay.classList.add('show'); menuCloseBtn.onclick=()=>menuOverlay.classList.remove('show'); menuOverlay.addEventListener('click',e=>{ if(e.target===menuOverlay) menuOverlay.classList.remove('show'); }); document.getElementById('exportBtn').onclick=()=>{ menuOverlay.classList.remove('show'); const jsonStr=JSON.stringify(data,null,2); const blob=new Blob([jsonStr],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='ledger-'+new Date().toISOString().split('T')[0]+'.json'; a.click(); URL.revokeObjectURL(url); showToast('导出成功'); }; document.getElementById('importBtn').onclick=()=>{ menuOverlay.classList.remove('show'); importFile.click(); }; importFile.onchange=function(e){ const f=e.target.files[0]; if(!f)return; const reader=new FileReader(); reader.onload=function(ev){ try{ let nd=JSON.parse(ev.target.result); if(!nd.banks||!nd.transactions) throw new Error('格式错误'); nd=normalizeData(nd); showModal('导入 '+nd.banks.length+' 分类 '+nd.transactions.length+' 条记录？',{icon:'📥',confirmText:'导入',confirmClass:'confirm-safe'}).then(ok=>{ if(!ok){ importFile.value=''; return; } data=nd; expandedBanks={}; nextBankId=1; nextTransactionId=1; data.banks.forEach(b=>{ if(b.id>=nextBankId) nextBankId=b.id+1; expandedBanks[b.id]=true; }); data.transactions.forEach(t=>{ if(t.id>=nextTransactionId) nextTransactionId=t.id+1; }); saveExpandedState(); saveData(); showToast('导入成功'); importFile.value=''; render(); }); }catch(err){ showToast('导入失败'); importFile.value=''; } }; reader.readAsText(f); }; document.getElementById('toggleAllStatusUnpaidBtn').onclick=()=>{ menuOverlay.classList.remove('show'); setAllStatusToUnpaid(); }; document.getElementById('toggleAllStatusPaidBtn').onclick=()=>{ menuOverlay.classList.remove('show'); setAllStatusToPaid(); }; document.getElementById('clearAllBtn').onclick=()=>{ menuOverlay.classList.remove('show'); if(data.banks.length===0&&data.transactions.length===0){ showToast('当前没有数据可清空'); return; } clearConfirmInput.value=''; clearConfirmOk.disabled=true; clearConfirmOverlay.classList.add('show'); setTimeout(()=>clearConfirmInput.focus(),100); }; clearConfirmCancel.onclick=()=>clearConfirmOverlay.classList.remove('show'); clearConfirmInput.oninput=function(){ clearConfirmOk.disabled=this.value!=='确认清空'; }; clearConfirmOk.onclick=function(){ if(clearConfirmInput.value==='确认清空'){ data={banks:[],transactions:[]}; expandedBanks={}; nextBankId=1; nextTransactionId=1; saveExpandedState(); saveData(); showToast('已清空所有数据'); clearConfirmOverlay.classList.remove('show'); render(); }else showToast('输入"确认清空"才能继续'); }; clearConfirmOverlay.addEventListener('click',e=>{ if(e.target===clearConfirmOverlay) clearConfirmOverlay.classList.remove('show'); }); document.getElementById('addBankBtn').onclick=()=>openBankForm(); exportNotesBtn.onclick=()=>{ menuOverlay.classList.remove('show'); notesPreview.textContent=generateNotes(); exportNotesOverlay.classList.add('show'); }; copyNotesBtn.onclick=()=>{ const txt=notesPreview.textContent; if(txt){ navigator.clipboard.writeText(txt).then(()=>showToast('笔记已复制')).catch(()=>{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('已复制'); }); } }; downloadNotesBtn.onclick=()=>{ const txt=notesPreview.textContent; if(txt){ const blob=new Blob([txt],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='记账笔记_'+new Date().toISOString().slice(0,10)+'.txt'; a.click(); showToast('笔记已下载'); } }; closeNotesBtn.onclick=()=>exportNotesOverlay.classList.remove('show'); exportNotesOverlay.addEventListener('click',e=>{ if(e.target===exportNotesOverlay) exportNotesOverlay.classList.remove('show'); }); bankFormOverlay.addEventListener('click',e=>{ if(e.target===bankFormOverlay) closeBankForm(); }); bankCancelBtn.onclick=closeBankForm; bankSaveBtn.onclick=function(){ const name=bankNameInput.value.trim(); if(!name){ showToast('请输入分类名称'); return; } if(editingBankId){ const bank=data.banks.find(b=>b.id===editingBankId); if(bank) bank.name=name; }else{ data.banks.push({id:nextBankId,name}); expandedBanks[nextBankId]=true; saveExpandedState(); nextBankId++; } saveData(); editingBankId=null; closeBankForm(); showToast('分类已保存'); render(); }; transactionFormOverlay.addEventListener('click',e=>{ if(e.target===transactionFormOverlay) closeTransactionForm(); }); transactionCancelBtn.onclick=closeTransactionForm; transactionSaveBtn.onclick=function(){ const name=transactionNameInput.value.trim(); const amountRaw=transactionAmountInput.value; const currency=transactionCurrency.value; const type=transactionType.value; const status=transactionStatusEl.value; if(!name){ showToast('请输入名称'); return; } let amount=parseFloat(amountRaw); if(isNaN(amount)||amount<0){ showToast('请输入有效金额'); return; } let amountMYR=amount; if(currency==='SGD') amountMYR=amount*currentRate; let finalDate; if(editingTransactionId){ const t=data.transactions.find(x=>x.id===editingTransactionId); finalDate=t?t.date:''; }else{ const now=new Date(); finalDate=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0'); } if(editingTransactionId){ const t=data.transactions.find(x=>x.id===editingTransactionId); if(t){ t.name=name; t.amountMYR=amountMYR; t.type=type; t.status=status; t.date=finalDate; t.originalCurrency=currency; t.originalAmount=amount; } }else{ data.transactions.push({id:nextTransactionId,bankId:currentBankId,name,amountMYR,type,status,date:finalDate,originalCurrency:currency,originalAmount:amount}); nextTransactionId++; } saveData(); editingTransactionId=null; currentBankId=null; closeTransactionForm(); showToast('已保存'); render(); }; }
    let deferredPrompt; window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferredPrompt=e; installBtn.style.display='flex'; }); installBtn.addEventListener('click',async function(){ menuOverlay.classList.remove('show'); if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.style.display='none'; }else showToast('请查看浏览器安装选项'); });
    loadData(); initEventListeners(); render();
  })();
</script>
<script>if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(err=>console.log('SW failed',err)); }); } function isIOS(){ return /iphone|ipad|ipod/i.test(window.navigator.userAgent); } function isInStandaloneMode(){ return ('standalone' in window.navigator) && window.navigator.standalone; } window.addEventListener('load',()=>{ if(isIOS()&&!isInStandaloneMode()){ setTimeout(()=>{ const iosTip=document.createElement('div'); iosTip.innerHTML=`<div style="position:fixed;left:50%;bottom:20px;transform:translateX(-50%);width:90%;max-width:420px;background:#f0f0f0;color:#333;padding:16px;border-radius:20px;z-index:99999;box-shadow:0 10px 30px rgba(0,0,0,0.2);font-size:14px;line-height:1.6;text-align:center;"><div style="font-size:16px;font-weight:700;margin-bottom:8px;">📱 安装到 iPhone</div><div>点击 Safari 的 <b>分享按钮</b><br>然后选择 <b>「添加到主屏幕」</b></div><button id="closeIosTip" style="margin-top:12px;border:none;background:#ddd;padding:8px 18px;border-radius:12px;cursor:pointer;">知道了</button></div>`; document.body.appendChild(iosTip); document.getElementById('closeIosTip').onclick=()=>iosTip.remove(); },1500); } });</script>
